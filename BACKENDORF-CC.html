<!<!DOCTYPE html>
	<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Critical extractor from Coverage JSON</title>
	</head>
	<body>
		<input type="file" id="selectFiles" value="Import" /><br />
		<button id="import">Import</button>
		<button id="convert" onclick="critical()">Convert</button>
		<textarea id="result"></textarea>
		<textarea id="critical"></textarea>
		<script type="text/javascript">
			document.getElementById('import').onclick = function() {
				var files = document.getElementById('selectFiles').files;
				console.log(files);
				if (files.length <= 0) {
					return false;
				}

				var fr = new FileReader();

				fr.onload = function(e) { 
					console.log(e);
					var result = JSON.parse(e.target.result);
					var formatted = JSON.stringify(result, null, 2);
					document.getElementById('result').value = formatted;
				}

				fr.readAsText(files.item(0));
			};

			function critical() {
				// debugger;
				let files = JSON.parse(document.getElementById('result').value);
				let usedCode = '';

				for (file in files) {
					usedCode += '/* FILENAME '+ files[file].url+' */';
					if (files[file].url.split('.').pop() ==='css') {
						// files.splice(file);
						ranges = files[file];
						let text = ranges.text;
						for (let i = 0; i < ranges.ranges.length; i++) {
							const range = ranges.ranges[i];
							// console.info(text.substring(range.start, range.end));
							usedCode += text.substring(range.start, range.end);
						}
					}
					usedCode += '/* END FILE '+ files[file].url+ ' /*';
				}

				document.getElementById('critical').value = usedCode;
			}
		</script>
		<style type="text/css">
			textarea {
				width: 100vw;
				height: 40vh;
			}
		</style>

	</body>
	</html>
